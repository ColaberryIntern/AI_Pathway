<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Fluency Assessment — GenAI Skills Ontology v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--bg2:#0d0d1c;--bg3:#13132a;--bg4:#191935;--br:#1e1e40;--br2:#28285a;--tx:#eeeeff;--mu:#b0b0d8;--di:#9090b8;--c1:#6366F1;--c2:#8B5CF6;--c3:#EC4899;--c4:#06B6D4;--c5:#10B981;--fh:'Space Grotesk',system-ui,sans-serif;--fm:'JetBrains Mono','Fira Code',monospace}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:13px;min-height:100vh;line-height:1.55}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.55}
.app{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:20px 16px 80px}
.hdr{text-align:center;padding:44px 0 28px}
.hdr h1{font-family:var(--fh);font-size:clamp(22px,4vw,42px);font-weight:700;background:linear-gradient(135deg,var(--c4),var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;margin-bottom:10px}
.hdr p{color:var(--mu);font-size:13px;max-width:580px;margin:0 auto 14px}
.vtag{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;border:1px solid var(--c1);color:var(--c1);padding:3px 12px;border-radius:20px;background:rgba(99,102,241,.08)}
.legend{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.leg{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--br);border-radius:8px;padding:7px 11px;min-width:115px}
.leg-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;font-size:11px;color:#fff;flex-shrink:0}
.leg-n{font-family:var(--fh);font-weight:600;font-size:11px}.leg-d{font-size:9px;color:var(--di);margin-top:1px}
.prog-wrap{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:13px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.prog-label{font-family:var(--fh);font-weight:600;font-size:13px;white-space:nowrap}
.prog-track{flex:1;min-width:200px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c4),var(--c1),var(--c3));border-radius:3px;transition:width .4s ease;width:0%}
.prog-stats{display:flex;gap:14px;font-size:11px;color:var(--mu);flex-wrap:wrap}
.prog-stats b{color:var(--tx)}
.toolbar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.toolbar button,.toolbar select{background:var(--bg2);color:var(--tx);border:1px solid var(--br2);padding:8px 13px;border-radius:7px;font-family:var(--fm);font-size:12px;cursor:pointer;transition:all .2s}
.toolbar button:hover{border-color:var(--c1);background:var(--bg3)}.toolbar select{min-width:150px}
.sp{flex:1}.btn-ex{background:linear-gradient(135deg,var(--c4),var(--c1))!important;border:none!important;font-family:var(--fh)!important;font-weight:600!important;color:#fff!important}
.btn-rst{border-color:#ef4444!important;color:#ef4444!important}.btn-rst:hover{background:rgba(239,68,68,.1)!important}
.layer-group{margin-bottom:24px}
.ly-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 8px;margin-bottom:8px;border-bottom:2px solid;font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.ly-pill{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;color:#fff;flex-shrink:0}
.ly-cnt{font-size:10px;color:var(--di);margin-left:auto;font-family:var(--fm)}
.domain{margin-bottom:6px;border:1px solid var(--br);border-radius:12px;overflow:hidden;background:var(--bg2);transition:border-color .2s}
.domain:hover{border-color:var(--br2)}
.dom-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;user-select:none;transition:background .2s}
.dom-hdr:hover{background:var(--bg3)}.dom-left{display:flex;align-items:center;gap:11px}
.dom-acc{width:4px;min-height:36px;border-radius:2px;flex-shrink:0}
.dom-name{font-family:var(--fh);font-weight:700;font-size:14px}.dom-sub{font-size:11px;color:var(--di);margin-top:1px}
.dom-right{display:flex;align-items:center;gap:12px}.dom-avg{font-size:12px;color:var(--mu)}
.dom-avg b{color:var(--tx);font-size:15px;font-family:var(--fh)}.dom-chev{font-size:13px;color:var(--di);transition:transform .3s}
.domain.open .dom-chev{transform:rotate(180deg)}
.dom-body{max-height:0;overflow:hidden;transition:max-height .45s ease}
.domain.open .dom-body{max-height:10000px}
.skill-row{display:flex;align-items:flex-start;gap:14px;padding:10px 18px;border-top:1px solid var(--br);transition:background .15s}
.skill-row:hover{background:rgba(255,255,255,.012)}
.sk-info{flex:1;min-width:0}
.sk-name{font-family:var(--fh);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.new-badge{font-size:9px;padding:2px 6px;background:linear-gradient(135deg,var(--c1),var(--c3));color:#fff;border-radius:4px;font-family:var(--fm);font-weight:700;letter-spacing:.5px;flex-shrink:0}
.sk-meta{font-size:10px;color:var(--di);margin-top:2px;font-family:var(--fm)}
.sk-rubric{font-size:11px;margin-top:6px;font-family:var(--fm);font-style:italic;color:#d8d8f0;max-width:520px;line-height:1.45;display:none;padding:5px 10px;border-radius:4px;border-left:2px solid currentColor;background:rgba(255,255,255,.04)}
.sk-rubric.vis{display:block}
.lv-track{display:flex;align-items:center;gap:5px;position:relative;flex-shrink:0;padding:3px 0}
.lv-track::before{content:'';position:absolute;left:15px;right:15px;top:50%;height:2px;background:linear-gradient(90deg,#374151,var(--c4),var(--c1),var(--c3));transform:translateY(-50%);z-index:0;border-radius:1px}
.nd{width:30px;height:30px;border-radius:50%;border:2px solid #374151;background:var(--bg);color:var(--di);font-family:var(--fm);font-weight:700;font-size:11px;cursor:pointer;position:relative;z-index:1;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nd:hover{transform:scale(1.18);z-index:2}
.nd.active{color:#fff;border-color:var(--lc,var(--c1));background:var(--lc,var(--c1));box-shadow:0 0 12px var(--lc,var(--c1))}
#tt{position:fixed;z-index:9999;background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:10px 14px;max-width:290px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 28px rgba(0,0,0,.65);display:none}
#tt.vis{opacity:1;display:block}
#ttl{font-family:var(--fh);font-weight:700;font-size:12px;margin-bottom:4px}
#ttt{color:#d0d0ee;font-family:var(--fm);font-size:11px;line-height:1.45}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--c1)}
@media(max-width:640px){.lv-track{gap:3px}.nd{width:26px;height:26px;font-size:10px}.lv-track::before{left:13px;right:13px}.skill-row{flex-wrap:wrap}}
</style></head><body>
<canvas id="bg"></canvas>
<div id="tt"><div id="ttl"></div><div id="ttt"></div></div>
<div class="app"><div id="root"></div></div>
<script>
// Canvas
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  const COLS=['#6366F1','#8B5CF6','#EC4899','#06B6D4','#10B981'];
  let pts=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  function init(){pts=[];const n=Math.min(55,Math.floor(window.innerWidth*window.innerHeight/15000));for(let i=0;i<n;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.5+.5,col:COLS[i%COLS.length]})}
  let last=0;
  function draw(ts){if(ts-last<33){requestAnimationFrame(draw);return}last=ts;ctx.clearRect(0,0,c.width,c.height);for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<150){const a=Math.floor((1-d/150)*35).toString(16).padStart(2,'0');ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=pts[i].col+a;ctx.lineWidth=.6;ctx.stroke()}}pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle=p.col+'99';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1});requestAnimationFrame(draw)}
  resize();init();requestAnimationFrame(draw);window.addEventListener('resize',()=>{resize();init()});
})();

// Tooltip
const ttEl=document.getElementById('tt'),ttlEl=document.getElementById('ttl'),tttEl=document.getElementById('ttt');
let ttTO=null;
function showTT(btn,lvInfo,rubricText){clearTimeout(ttTO);ttlEl.textContent=lvInfo.label;ttlEl.style.color=lvInfo.color;tttEl.textContent=rubricText||'No rubric defined.';ttEl.classList.add('vis');const r=btn.getBoundingClientRect();let left=r.left+window.scrollX,top=r.bottom+window.scrollY+6;if(left+300>window.innerWidth)left=window.innerWidth-310;ttEl.style.left=left+'px';ttEl.style.top=top+'px'}
function hideTT(){ttTO=setTimeout(()=>{ttEl.classList.remove('vis');ttTO=setTimeout(()=>{ttEl.style.display='none';ttEl.style.display=''},200)},120)}

// Rubrics
const R={
'SK.DIG.001':['Has not used a web browser or search engine','Can open a browser, type a URL, and run a basic search','Uses search operators, evaluates results, and bookmarks useful pages','Teaches others effective search techniques; uses advanced search features','Builds curated research workflows combining multiple search tools','Designs information retrieval strategies and search training programs'],
'SK.DIG.002':['Unaware of file systems or cloud storage','Can save, rename, and organize files in folders','Uses cloud storage (Google Drive, OneDrive), shares files, manages permissions','Sets up folder structures for teams; handles version conflicts','Builds automated file workflows (backup scripts, sync pipelines)','Designs org-wide file management and governance policies'],
'SK.DIG.003':['Has never used a spreadsheet','Can enter data, format cells, and do basic sums','Uses formulas (VLOOKUP, IF), sorts, filters, and creates charts','Builds complex models with pivot tables and conditional formatting','Creates automated reporting dashboards with macros or scripts','Designs spreadsheet-based systems and trains teams on data modeling'],
'SK.DIG.004':['Has not used email or messaging tools','Can send, reply, and forward emails; uses basic chat apps','Manages folders, filters, and calendar invites; uses threads effectively','Coordinates team communication; sets up shared channels and norms','Integrates email/chat with automation tools (Zapier, Power Automate)','Designs communication architectures and policies for organizations'],
'SK.DIG.005':['Unaware of password security concepts','Knows to use unique passwords and recognizes phishing basics','Uses a password manager; enables 2FA on key accounts','Advises others on account security; reviews team security practices','Implements SSO and enterprise authentication solutions','Designs security-first identity and access management systems'],
'SK.DIG.006':['Cannot install or update applications','Can download and install apps from official stores','Manages app settings, permissions, and updates across devices','Troubleshoots installation issues; manages dependencies','Packages and deploys applications for teams or clients','Designs application distribution and lifecycle management systems'],
'SK.DIG.007':['Unaware of keyboard shortcuts','Knows copy, paste, undo, and a few OS shortcuts','Uses shortcuts fluently across multiple apps','Customizes shortcuts; uses clipboard managers and text expansion','Builds keyboard-driven workflows and automates repetitive tasks','Designs accessibility-first interaction patterns and shortcut systems'],
'SK.DIG.008':['Has not used video call or screen sharing tools','Can join a video call and share their screen when guided','Manages meeting settings, recordings, breakout rooms, and annotations','Facilitates remote workshops; troubleshoots A/V issues for others','Integrates conferencing tools with other workflows (recording to summary)','Designs hybrid collaboration architectures for organizations'],
'SK.CTIC.001':['Does not consider whether a source is trustworthy','Knows some sources are more reliable than others','Checks author credentials, publication date, and cross-references claims','Teaches source evaluation frameworks (CRAAP test, lateral reading)','Builds source credibility scoring into information workflows','Designs institutional media literacy and source evaluation programs'],
'SK.CTIC.002':['Unaware of misinformation as a concept','Recognizes that misinformation exists online','Identifies common patterns: clickbait, emotional manipulation, cherry-picked data','Systematically debunks misinformation; uses fact-checking tools','Builds misinformation detection tools or automated flagging systems','Designs counter-misinformation strategies and platform-level safeguards'],
'SK.CTIC.003':['Does not cross-reference information','Knows claims should be verified with multiple sources','Routinely checks claims against 2-3 independent sources before accepting','Uses structured verification methods; triangulates across source types','Builds automated cross-referencing pipelines for content validation','Designs verification frameworks for newsrooms or research teams'],
'SK.CTIC.004':['Unaware that content can carry bias','Recognizes that news and media can be biased','Identifies bias indicators: framing, omission, language choices','Analyzes bias across multiple viewpoints; adjusts own consumption habits','Builds bias detection tools or scoring rubrics for content review','Designs bias-aware editorial and content governance systems'],
'SK.CTIC.005':['Cannot distinguish facts from opinions','Knows the difference between a fact and an opinion','Consistently separates factual claims from editorial commentary','Teaches the distinction; applies it in professional writing and reviews','Builds content classification systems that separate fact from opinion','Designs fact/opinion labeling standards for publishing platforms'],
'SK.CTIC.006':['Unaware that AI can generate text, images, or video','Knows AI-generated content exists (deepfakes, ChatGPT text)','Uses detection cues (artifacts, phrasing patterns) to identify AI content','Applies detection tools (GPTZero, metadata analysis) and teaches others','Builds AI content detection pipelines for content moderation','Designs provenance and watermarking systems for AI content authenticity'],
'SK.FND.000':['Has not heard of AI or how it differs from regular software','Can explain that AI learns from data rather than following hardcoded rules','Describes key differences: training vs programming, probabilistic vs deterministic','Explains AI vs traditional software to non-technical stakeholders with examples','Builds demonstrations or training materials comparing AI and traditional approaches','Designs curricula or frameworks for teaching AI literacy at scale'],
'SK.FND.001':['Has not heard of LLMs, tokens, or context windows','Can explain what tokens are and that LLMs predict next tokens','Understands context window limits, token counting, and how prediction works','Optimizes prompts based on tokenization; explains context window trade-offs','Builds token-aware applications with context window management','Designs architectures that account for tokenization and context constraints'],
'SK.FND.002':['Unaware of AI limitations or hallucination risk','Knows AI can make mistakes and hallucinate incorrect information','Identifies common failure modes: hallucination, outdated info, reasoning errors','Designs workflows with verification steps to catch hallucinations','Builds guardrails and automated checks for hallucination detection','Designs system-level reliability architectures accounting for all failure modes'],
'SK.FND.003':['Unaware that different AI models exist','Knows there are multiple model families (GPT, Claude, Llama, Gemini)','Compares open vs closed models on cost, privacy, and capability trade-offs','Selects models for specific tasks based on benchmarks and constraints','Builds model evaluation frameworks and switching infrastructure','Designs multi-model architectures with routing, fallback, and governance'],
'SK.FND.004':['Unaware of how AI generates answers vs retrieves information','Knows AI can reason, retrieve from context, and use tools','Explains when to use pure reasoning vs RAG vs tool-calling approaches','Designs workflows that combine reasoning, retrieval, and tools effectively','Builds systems that dynamically choose between reasoning, retrieval, and tools','Designs decision frameworks for hybrid AI architectures at scale'],
'SK.FND.005':['Unaware that models have training data or knowledge cutoffs','Knows models have a knowledge cutoff date and may lack recent info','Checks cutoff dates when prompting; provides context for recent events','Designs prompts and workflows that account for knowledge staleness','Builds systems with automatic staleness detection and live data augmentation','Designs data freshness architectures combining models with live retrieval'],
'SK.FND.006':['Has not heard of temperature or sampling in AI','Knows temperature controls randomness in model output','Adjusts temperature, top-p, and other sampling parameters for different tasks','Optimizes sampling settings per use case (creative vs factual)','Builds adaptive sampling systems that tune parameters based on context','Designs sampling strategies for production systems balancing quality and diversity'],
'SK.FND.010':['Has not heard of transformers or attention','Knows transformers are the architecture behind modern LLMs','Explains self-attention, positional encoding, and why transformers scale well','Discusses architectural trade-offs (encoder-only, decoder-only, encoder-decoder)','Implements or fine-tunes transformer-based models for specific tasks','Designs novel transformer architectures or significant architectural modifications'],
'SK.FND.011':['Has not heard of diffusion models','Knows diffusion models power image generation (Stable Diffusion, DALL-E)','Explains the noise-to-image denoising process at a conceptual level','Compares diffusion model variants and their strengths/weaknesses','Fine-tunes or trains diffusion models for specific visual domains','Designs diffusion-based generation systems with custom pipelines'],
'SK.FND.012':['Has not heard of embeddings or vectors','Knows embeddings convert text/images into numerical vectors for comparison','Explains cosine similarity, embedding dimensions, and semantic search basics','Selects embedding models for specific tasks; evaluates embedding quality','Builds embedding pipelines for production (chunking, indexing, querying)','Designs embedding architectures with custom models and multi-modal indexing'],
'SK.FND.013':['Unaware that AI can process multiple media types','Knows some models can handle text, images, and audio together','Explains how multimodal models combine inputs (vision transformers, CLIP)','Evaluates multimodal model capabilities for specific use cases','Builds applications that leverage multimodal inputs and outputs','Designs multimodal AI architectures combining multiple models and modalities'],
'SK.FND.020':['Unaware of privacy concerns when using AI','Knows not to paste sensitive data into public AI tools','Follows organizational data classification policies when using AI','Designs privacy guidelines for AI usage within teams or departments','Builds privacy-preserving AI workflows (data masking, on-prem models)','Designs enterprise-wide AI privacy architectures and compliance frameworks'],
'SK.FND.021':['Unaware of copyright or IP issues related to AI','Knows AI-generated content may have copyright implications','Understands training data IP issues, fair use, and output ownership questions','Advises teams on IP policies for AI-generated content','Implements IP compliance checks in AI content generation workflows','Designs organizational IP and copyright policy frameworks for AI'],
'SK.FND.022':['Unaware that AI systems can produce biased outputs','Knows AI can reflect biases from training data','Identifies examples of AI bias (hiring, lending, content generation)','Evaluates model outputs for bias and recommends mitigations','Builds bias detection and mitigation pipelines into AI workflows','Designs fairness frameworks and bias audit programs for AI systems'],
'SK.FND.023':['Unaware that AI has environmental costs','Knows training and running AI models consumes significant energy','Can discuss carbon footprint of model training vs inference trade-offs','Recommends smaller models or efficient approaches to reduce environmental impact','Builds carbon-aware model selection and deployment pipelines','Designs sustainability strategies for large-scale AI infrastructure'],
'SK.PRM.000':['Has not interacted with an AI assistant','Can type a basic question into ChatGPT/Claude and get a response','Writes clear, specific requests with context and desired output format','Coaches others on writing effective prompts; identifies common pitfalls','Builds prompt templates and libraries for team or product use','Designs prompt engineering curricula and organizational prompt standards'],
'SK.PRM.001':['Unaware that prompt structure affects output quality','Knows that adding instructions and constraints improves AI responses','Consistently uses instruction + constraint + format structure in prompts','Designs complex multi-section prompts with clear formatting directives','Builds prompt systems with composable instruction/constraint/format blocks','Designs prompt architectures that separate concerns and enable reuse at scale'],
'SK.PRM.002':['Has not heard of few-shot prompting','Knows that providing examples helps the AI understand the desired output','Provides 2-5 well-chosen examples that cover edge cases','Curates example sets strategically; tests which examples improve quality most','Builds automated few-shot selection systems from example databases','Designs dynamic few-shot retrieval architectures for production prompts'],
'SK.PRM.003':['Does not iterate on prompts','Knows that prompts can be revised when output is unsatisfactory','Systematically debugs prompts: isolates variables, tests variations, logs results','Uses A/B prompt testing; tracks prompt versions with change notes','Builds prompt debugging and regression testing tools','Designs prompt lifecycle management systems with automated quality gates'],
'SK.PRM.004':['Has not used role or persona prompting','Knows you can ask the AI to respond as a specific role or persona','Crafts effective system prompts defining persona, tone, and constraints','Designs multi-persona systems; benchmarks persona effectiveness','Builds persona management systems with version control and A/B testing','Designs persona architecture patterns for complex multi-agent products'],
'SK.PRM.005':['Has not heard of chain-of-thought prompting','Knows asking AI to think step by step can improve reasoning','Uses CoT effectively for math, logic, and multi-step tasks','Designs CoT strategies for domain-specific reasoning problems','Builds systems that automatically inject CoT for complex queries','Designs reasoning architecture patterns combining CoT with other techniques'],
'SK.PRM.006':['Does not break tasks into steps for AI','Knows complex tasks work better when broken into smaller pieces','Decomposes tasks into sequential prompts with clear handoffs','Designs multi-step prompt chains with error handling between steps','Builds automated task decomposition and chaining pipelines','Designs task orchestration architectures with dynamic step planning'],
'SK.PRM.010':['Has not requested structured output from AI','Knows AI can output JSON or structured formats when asked','Defines JSON schemas in prompts and validates output structure','Designs robust schema prompts with error recovery for malformed output','Builds structured output pipelines with schema validation and retry logic','Designs schema evolution strategies and structured output standards for platforms'],
'SK.PRM.011':['Has not used rubrics in prompts','Knows rubrics can guide AI to evaluate or score content','Creates detailed rubrics with criteria and scoring scales for AI evaluation','Designs calibrated rubrics validated against human expert ratings','Builds rubric-based evaluation systems with automated scoring pipelines','Designs rubric frameworks and evaluation architectures for quality assurance'],
'SK.PRM.020':['Unaware of iterative refinement workflows with AI','Knows you can ask AI to draft, then critique, then revise','Runs structured draft to critique to revise cycles with clear criteria','Designs multi-pass refinement workflows for specific content types','Builds automated refinement pipelines with quality convergence checks','Designs self-improving content generation architectures with feedback loops'],
'SK.PRM.021':['Unaware that AI should cite sources or be grounded','Knows AI can be prompted to provide citations and reference sources','Writes prompts that require grounded responses with source attribution','Designs grounding strategies: inline citations, confidence markers, caveats','Builds citation verification and grounding pipelines','Designs citation and grounding architectures for trustworthy AI systems'],
'SK.PRM.022':['Has not heard of ReAct or reasoning-action patterns','Knows ReAct combines reasoning with tool actions in a loop','Implements ReAct-style prompts: Thought then Action then Observation then repeat','Designs custom reasoning-action patterns for domain-specific workflows','Builds ReAct orchestration frameworks with tool registries and error recovery','Designs advanced reasoning-action architectures for autonomous AI systems'],
'SK.RAG.000':['Has not heard of RAG or retrieval-augmented generation','Knows RAG lets AI answer questions using external documents','Explains the RAG pipeline: retrieve then augment context then generate','Evaluates when RAG is preferable to fine-tuning or large context','Builds end-to-end RAG systems with chunking, retrieval, and generation','Designs RAG architectures for enterprise scale with quality guarantees'],
'SK.RAG.001':['Unaware that user queries may need rewriting for retrieval','Knows query rewriting can improve retrieval results','Implements basic query expansion and reformulation techniques','Designs multi-query strategies (HyDE, step-back, sub-question decomposition)','Builds adaptive query rewriting pipelines with relevance feedback','Designs query understanding architectures that optimize retrieval across domains'],
'SK.RAG.002':['Unaware that documents need to be split for retrieval','Knows documents are chunked before embedding and indexing','Implements chunking with overlap, respecting section and paragraph boundaries','Designs semantic chunking strategies optimized for specific document types','Builds adaptive chunking pipelines that tune size based on content structure','Designs document processing architectures with hierarchical and semantic chunking'],
'SK.RAG.003':['Has not heard of hybrid retrieval','Knows both keyword (BM25) and vector search exist','Implements hybrid search combining BM25 and vector retrieval with fusion','Tunes hybrid weights per domain; evaluates retrieval precision/recall','Builds hybrid retrieval systems with learned fusion and query routing','Designs multi-strategy retrieval architectures with adaptive routing'],
'SK.RAG.010':['Unaware of reranking in search','Knows retrieved results can be reranked for better relevance','Implements cross-encoder reranking on initial retrieval results','Designs reranking pipelines with multiple scoring signals','Builds production reranking systems with latency and quality trade-offs','Designs multi-stage retrieval architectures with learned ranking models'],
'SK.RAG.011':['Unaware of context window budget constraints','Knows retrieved content must fit within the model context window','Manages token budgets: allocates space for system prompt, context, and output','Designs dynamic context allocation strategies based on query complexity','Builds context budgeting systems with automatic truncation and prioritization','Designs context-aware architectures that optimize information density per token'],

  'D.DOM':[{id:'SK.DOM.HC.001',label:'Healthcare: Clinical risk awareness'},{id:'SK.DOM.HC.002',label:'Healthcare: Evidence synthesis'},{id:'SK.DOM.LGL.001',label:'Legal: Disclaimer & advice boundaries'},{id:'SK.DOM.LGL.002',label:'Legal: Hallucination eval frameworks'},{id:'SK.DOM.FIN.001',label:'Finance: Numerical auditability'},{id:'SK.DOM.EDU.001',label:'Education: Learning design with AI'},{id:'SK.DOM.MKT.001',label:'Marketing: Content generation ethics'},{id:'SK.DOM.HR.001',label:'HR: AI in hiring considerations'}],
  'D.PRD':[{id:'SK.PRD.000',label:'AI product thinking basics'},{id:'SK.PRD.001',label:'Use-case selection & prioritization'},{id:'SK.PRD.002',label:'Workflow mapping'},{id:'SK.PRD.010',label:'Explainability UX design'},{id:'SK.PRD.011',label:'Feedback loop design'},{id:'SK.PRD.020',label:'AI enablement & training strategy'},{id:'SK.PRD.021',label:'Stakeholder management'},{id:'SK.PRD.022',label:'ROI measurement for AI'}],
  'D.COM':[{id:'SK.COM.001',label:'Explaining AI to non-technical audiences'},{id:'SK.COM.002',label:'Writing AI project proposals'},{id:'SK.COM.003',label:'Facilitating AI workshops'},{id:'SK.COM.004',label:'Managing AI expectations'},{id:'SK.COM.005',label:'Cross-functional AI collaboration'},{id:'SK.COM.006',label:'AI documentation best practices'}],
  'D.LRN':[{id:'SK.LRN.001',label:'Keeping up with AI developments'},{id:'SK.LRN.002',label:'Evaluating new AI tools'},{id:'SK.LRN.003',label:'Building personal AI workflows'},{id:'SK.LRN.004',label:'Teaching others AI skills'},{id:'SK.LRN.005',label:'Experimenting safely with AI'}],
  'D.RSN':[{id:'SK.RSN.000',label:'What are reasoning models (o3, R1, extended thinking)',isNew:true},{id:'SK.RSN.001',label:'Extended thinking & test-time compute',isNew:true},{id:'SK.RSN.002',label:'Reasoning model selection & routing',isNew:true},{id:'SK.RSN.003',label:'Deep research agents',isNew:true},{id:'SK.RSN.004',label:'Chain-of-thought verification',isNew:true},{id:'SK.RSN.005',label:'Inference cost budgeting for reasoning models',isNew:true}],

};

// State
const SK_KEY='ai-fluency-v3';
let ratings={};
function loadRatings(){try{const s=localStorage.getItem(SK_KEY);if(s)ratings=JSON.parse(s)}catch{ratings={}}}
function saveRatings(){localStorage.setItem(SK_KEY,JSON.stringify(ratings))}
function allSkills(){return Object.values(SKILLS).flat()}
function ratedCount(){return allSkills().filter(s=>ratings[s.id]!=null).length}
function avgScore(){const r=allSkills().filter(s=>ratings[s.id]!=null);return r.length?r.reduce((a,s)=>a+ratings[s.id],0)/r.length:0}
function domainAvg(dId){const sk=SKILLS[dId]||[];const r=sk.filter(s=>ratings[s.id]!=null);return r.length?(r.reduce((a,s)=>a+ratings[s.id],0)/r.length).toFixed(1):'-'}

// Render
function render(){
  const root=document.getElementById('root');
  const total=allSkills().length;
  root.innerHTML=`
<div class="hdr">
  <h1>AI Fluency Self-Assessment</h1>
  <p>Rate your proficiency across ${total} GenAI skills. Hover nodes to preview each level definition, click to set your rating.</p>
  <span class="vtag">GenAI Skills Ontology v2.0 &nbsp;&middot;&nbsp; ${total} skills &nbsp;&middot;&nbsp; 22 domains &nbsp;&middot;&nbsp; 8 layers</span>
</div>
<div class="legend">${LEVELS.map(l=>`<div class="leg"><div class="leg-dot" style="background:${l.color}">${l.v}</div><div><div class="leg-n">${l.label}</div><div class="leg-d">${l.desc}</div></div></div>`).join('')}</div>
<div class="prog-wrap">
  <span class="prog-label">Progress</span>
  <div class="prog-track"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-stats"><span><b id="pc">0</b> / ${total} rated</span><span>Avg score: <b id="pa">—</b></span></div>
</div>
<div class="toolbar">
  <select id="lf" onchange="filterLayer(this.value)"><option value="all">All Layers</option>${LAYERS.map(l=>`<option value="${l.id}">${l.label}</option>`).join('')}</select>
  <button onclick="expandAll()">Expand All</button>
  <button onclick="collapseAll()">Collapse All</button>
  <div class="sp"></div>
  <button class="btn-ex" onclick="exportJSON()">\u2B07 Export JSON</button>
  <button class="btn-rst" onclick="resetAll()">\u2715 Reset</button>
</div>
<div id="dc">${LAYERS.map(ly=>`
<div class="layer-group" id="lg-${ly.id}" data-layer="${ly.id}">
  <div class="ly-hdr" style="border-color:${ly.color};color:${ly.color}">
    <span class="ly-pill" style="background:${ly.color}">${ly.domains.length}</span>
    ${ly.label}
    <span class="ly-cnt">${ly.domains.reduce((a,d)=>a+(SKILLS[d]||[]).length,0)} skills</span>
  </div>
  ${ly.domains.map(dId=>{
    const dom=DOMAINS[dId];if(!dom)return'';
    const skills=SKILLS[dId]||[];
    return`<div class="domain" id="dom-${dId}" data-domain="${dId}">
  <div class="dom-hdr" onclick="toggleDomain('${dId}')">
    <div class="dom-left">
      <div class="dom-acc" style="background:${ly.color}"></div>
      <div><div class="dom-name">${dom.label}</div><div class="dom-sub">${dom.desc} &middot; ${skills.length} skills</div></div>
    </div>
    <div class="dom-right">
      <div class="dom-avg" id="avg-${dId}"><b>${domainAvg(dId)}</b> / 5</div>
      <span class="dom-chev">&#9662;</span>
    </div>
  </div>
  <div class="dom-body">${skills.map(sk=>{
    const lv=ratings[sk.id]!=null?ratings[sk.id]:null;
    const lc=lv!=null?LEVELS[lv].color:'';
    const rubricText=lv!=null&&R[sk.id]?R[sk.id][lv]:'';
    return`<div class="skill-row" data-skill="${sk.id}">
  <div class="sk-info">
    <div class="sk-name">${sk.label}${sk.isNew?'<span class="new-badge">NEW</span>':''}</div>
    <div class="sk-meta">${sk.id}</div>
    <div class="sk-rubric${lv!=null?' vis':''}" id="rub-${sk.id}" style="color:${lc};border-color:${lc}">${rubricText}</div>
  </div>
  <div class="lv-track">${LEVELS.map(l=>`<button class="nd${lv===l.v?' active':''}" data-lv="${l.v}" data-sk="${sk.id}" style="${lv===l.v?`--lc:${l.color}`:''}${lv===l.v?`;border-color:${l.color};background:${l.color}`:''}">${l.v}</button>`).join('')}</div>
</div>`}).join('')}</div>
</div>`}).join('')}
</div>`).join('')}</div>`;
  attachEvents();
  updateProgress();
}

function attachEvents(){
  document.querySelectorAll('.nd').forEach(btn=>{
    btn.addEventListener('mouseenter',()=>{
      const sid=btn.dataset.sk,lv=parseInt(btn.dataset.lv);
      showTT(btn,LEVELS[lv],R[sid]?.[lv]||'');
    });
    btn.addEventListener('mouseleave',hideTT);
    btn.addEventListener('click',()=>rate(btn.dataset.sk,parseInt(btn.dataset.lv)));
  });
}

function rate(sid,lv){
  ratings[sid]=lv;saveRatings();
  const row=document.querySelector(`[data-skill="${sid}"]`);
  if(!row)return;
  row.querySelectorAll('.nd').forEach(b=>{
    const bl=parseInt(b.dataset.lv),active=bl===lv;
    b.classList.toggle('active',active);
    if(active){b.style.setProperty('--lc',LEVELS[lv].color);b.style.borderColor=LEVELS[lv].color;b.style.background=LEVELS[lv].color;b.style.color='#fff'}
    else{b.style.removeProperty('--lc');b.style.borderColor='#374151';b.style.background='var(--bg)';b.style.color='var(--di)'}
  });
  const rubEl=document.getElementById('rub-'+sid);
  if(rubEl){rubEl.textContent=R[sid]?.[lv]||'';rubEl.style.color=LEVELS[lv].color;rubEl.style.borderColor=LEVELS[lv].color;rubEl.classList.add('vis')}
  const dId=row.closest('.domain')?.dataset?.domain;
  if(dId){const el=document.getElementById('avg-'+dId);if(el)el.innerHTML=`<b>${domainAvg(dId)}</b> / 5`}
  updateProgress();
}

function updateProgress(){
  const total=allSkills().length,rated=ratedCount(),pct=total?rated/total*100:0;
  const pf=document.getElementById('pf');if(pf)pf.style.width=pct+'%';
  const pc=document.getElementById('pc');if(pc)pc.textContent=rated;
  const pa=document.getElementById('pa');if(pa)pa.textContent=rated?avgScore().toFixed(2):'—';
}

function toggleDomain(dId){document.getElementById('dom-'+dId)?.classList.toggle('open')}
function expandAll(){document.querySelectorAll('.domain').forEach(d=>d.classList.add('open'))}
function collapseAll(){document.querySelectorAll('.domain').forEach(d=>d.classList.remove('open'))}
function filterLayer(val){document.querySelectorAll('.layer-group').forEach(lg=>{lg.style.display=(val==='all'||lg.dataset.layer===val)?'':'none'})}

function exportJSON(){
  const out={exported:new Date().toISOString(),totalSkills:allSkills().length,rated:ratedCount(),avgScore:avgScore().toFixed(2),ratings:{}};
  allSkills().forEach(sk=>{if(ratings[sk.id]!=null){const lv=ratings[sk.id];out.ratings[sk.id]={label:sk.label,level:lv,levelLabel:LEVELS[lv].label,rubric:R[sk.id]?.[lv]||''}}});
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(out,null,2));
  a.download='ai-fluency-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function resetAll(){if(confirm('Reset all ratings? This cannot be undone.')){ratings={};saveRatings();render()}}

// Init
loadRatings();render();
</script>
</body></html>
