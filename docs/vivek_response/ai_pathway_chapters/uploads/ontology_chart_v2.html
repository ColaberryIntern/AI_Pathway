<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAI Skills Ontology v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{--bg:#080810;--bg2:#0d0d1c;--bg3:#13132a;--bg4:#191935;--br:#1e1e40;--br2:#28285a;--tx:#eeeeff;--mu:#b0b0d8;--di:#9090b8;--c1:#6366F1;--c2:#8B5CF6;--c3:#EC4899;--c4:#06B6D4;--c5:#10B981;--fh:'Space Grotesk',system-ui,sans-serif;--fm:'JetBrains Mono','Fira Code',monospace}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fh);font-size:14px;min-height:100vh;line-height:1.55}
#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.4}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px 16px 80px}
.hdr{text-align:center;padding:40px 0 24px}
.hdr h1{font-family:var(--fh);font-size:clamp(22px,4vw,40px);font-weight:700;background:linear-gradient(135deg,var(--c4),var(--c1),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;margin-bottom:8px}
.hdr p{color:var(--mu);font-size:13px;margin:0 auto 10px}
.vtag{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;border:1px solid var(--c1);color:var(--c1);padding:3px 12px;border-radius:20px;background:rgba(99,102,241,.08)}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}
.stat-chip{background:var(--bg2);border:1px solid var(--br);border-radius:10px;padding:10px 18px;text-align:center;min-width:100px}
.stat-chip .n{font-family:var(--fh);font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--c4),var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-chip .l{font-size:11px;color:var(--mu);margin-top:2px}
.tab-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;justify-content:center}
.tab-btn{background:var(--bg2);color:var(--mu);border:1px solid var(--br);padding:8px 16px;border-radius:8px;font-family:var(--fh);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--c1);color:var(--tx);background:var(--bg3)}
.tab-btn.active{background:var(--c1);color:#fff;border-color:var(--c1)}
.view{display:none}.view.active{display:block}
.new-badge{font-size:8px;padding:2px 5px;background:linear-gradient(135deg,var(--c1),var(--c3));color:#fff;border-radius:4px;font-family:var(--fm);font-weight:700;letter-spacing:.5px;vertical-align:middle;margin-left:4px}
/* Mind Map */
#mm-wrap{background:var(--bg2);border:1px solid var(--br);border-radius:12px;overflow:hidden;position:relative;height:680px}
.mm-hint{position:absolute;top:12px;left:12px;background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--mu);z-index:10;font-family:var(--fm);pointer-events:none}
.mm-ctrl{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:10}
.mm-ctrl button{width:30px;height:30px;background:var(--bg4);border:1px solid var(--br2);border-radius:7px;color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.mm-ctrl button:hover{border-color:var(--c1)}
#mm-tt{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:8px 16px;font-size:12px;color:var(--tx);opacity:0;transition:opacity .2s;pointer-events:none;z-index:10;white-space:nowrap;max-width:420px;text-align:center}
#mm-tt.vis{opacity:1}
/* Layers */
.layer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:20px}
.layer-card{background:var(--bg2);border:2px solid var(--br);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
.layer-card:hover{transform:translateY(-2px)}
.layer-card.sel{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.lc-dot{width:10px;height:10px;border-radius:50%;margin-bottom:10px}
.lc-name{font-family:var(--fh);font-weight:700;font-size:13px;margin-bottom:3px}
.lc-id{font-family:var(--fm);font-size:10px;color:var(--di);margin-bottom:6px}
.lc-cnt{font-size:11px;color:var(--mu)}
/* Domain cards */
.domain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.domain-card{background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s}
.domain-card:hover{border-color:var(--br2);background:var(--bg3)}
.dc-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dc-name{font-family:var(--fh);font-weight:600;font-size:13px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.dc-id{font-family:var(--fm);font-size:10px;color:var(--di);margin-bottom:4px}
.dc-desc{font-size:11px;color:var(--mu);margin-bottom:8px}
.dc-foot{display:flex;align-items:center;gap:8px;font-size:11px}
.dc-cnt{color:var(--tx);font-weight:600}
.dc-new{color:var(--c3);font-family:var(--fm)}
.skill-list{display:none;margin-top:10px;border-top:1px solid var(--br);padding-top:10px}
.skill-list.open{display:block}
.sl-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:11px;font-family:var(--fm);border-bottom:1px solid rgba(255,255,255,.03)}
.sl-item:last-child{border-bottom:none}
.sl-id{color:var(--di);flex-shrink:0}
/* Force graph */
#fg-wrap{background:var(--bg2);border:1px solid var(--br);border-radius:12px;overflow:hidden;position:relative;height:680px}
.fg-hint{position:absolute;top:12px;left:12px;background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--mu);z-index:10;font-family:var(--fm);pointer-events:none}
.fg-leg{position:absolute;top:12px;right:12px;background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:10px 14px;z-index:10}
.fgl-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--mu);margin-bottom:5px}
.fgl-row:last-child{margin-bottom:0}
/* Stats */
.ss-title{font-family:var(--fh);font-weight:700;font-size:15px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--br);color:var(--tx)}
.ss-block{margin-bottom:28px}
.dist-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.dist-lbl{font-family:var(--fm);font-size:11px;color:var(--mu);width:190px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dist-bar{flex:1;height:14px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dist-fill{height:100%;border-radius:4px;transition:width .6s ease}
.dist-cnt{font-family:var(--fm);font-size:11px;color:var(--mu);width:50px;text-align:right;flex-shrink:0}
.new-flag{display:inline-block;font-size:9px;padding:1px 5px;background:rgba(236,72,153,.18);color:var(--c3);border-radius:3px;margin-left:4px;font-family:var(--fm)}
/* Tooltip */
#tt{position:fixed;z-index:9999;background:var(--bg4);border:1px solid var(--br2);border-radius:8px;padding:10px 14px;max-width:260px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 8px 28px rgba(0,0,0,.65)}
#tt.vis{opacity:1}
#ttl{font-family:var(--fh);font-weight:700;font-size:12px;margin-bottom:2px}
#tts{font-family:var(--fm);font-size:10px;color:var(--di);margin-bottom:4px}
#ttt{color:#d0d0ee;font-family:var(--fm);font-size:11px;line-height:1.45}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--c1)}
@media(max-width:640px){.domain-grid{grid-template-columns:1fr}.layer-grid{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<canvas id="bg"></canvas>
<div id="tt"><div id="ttl"></div><div id="tts"></div><div id="ttt"></div></div>
<div class="app">
  <div class="hdr">
    <h1>GenAI Skills Ontology</h1>
    <p>8 Layers · 22 Domains · 186 Skills · 33 New in 2025–26</p>
    <div class="vtag">v2.0.0 — March 2026</div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('mindmap')">Mind Map</button>
    <button class="tab-btn" onclick="switchTab('layers')">Layers</button>
    <button class="tab-btn" onclick="switchTab('domains')">All Domains</button>
    <button class="tab-btn" onclick="switchTab('force')">Force Graph</button>
    <button class="tab-btn" onclick="switchTab('stats')">Stats</button>

      </div>
      <div id="mm-tt"></div>

  </div>
  <div id="view-layers" class="view">

<script>
// Canvas background
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  const COLS=['#6366F1','#8B5CF6','#EC4899','#06B6D4','#10B981'];
  let pts=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  function init(){pts=[];const n=Math.min(45,Math.floor(window.innerWidth*window.innerHeight/18000));for(let i=0;i<n;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.5+.5,col:COLS[i%COLS.length]})}
  let last=0;
  function draw(ts){if(ts-last<33){requestAnimationFrame(draw);return}last=ts;ctx.clearRect(0,0,c.width,c.height);for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<140){const a=Math.floor((1-d/140)*28).toString(16).padStart(2,'0');ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=pts[i].col+a;ctx.lineWidth=.5;ctx.stroke()}}pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fillStyle=p.col+'88';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1});requestAnimationFrame(draw)}
  resize();init();requestAnimationFrame(draw);window.addEventListener('resize',()=>{resize();init()});
})();

function layerFor(dId){return LAYERS.find(l=>l.domains.includes(dId))||LAYERS[0]}
const totalSk=allSkills().length;
const newSk=allSkills().filter(s=>s.isNew).length;

// Tab switching
let _mmInit=false,_fgInit=false,_lyInit=false,_adInit=false,_stInit=false;
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['mindmap','layers','domains','force','stats'][i]===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='mindmap'&&!_mmInit){initMindMap();_mmInit=true}
  if(tab==='layers'&&!_lyInit){renderLayers();_lyInit=true}
  if(tab==='domains'&&!_adInit){renderAllDomains();_adInit=true}
  if(tab==='force'&&!_fgInit){initForceGraph();_fgInit=true}
  if(tab==='stats'&&!_stInit){renderStats();_stInit=true}
}

// Tooltip
const ttEl=document.getElementById('tt'),ttlEl=document.getElementById('ttl'),ttsEl=document.getElementById('tts'),tttEl=document.getElementById('ttt');
function showTT(e,title,sub,body){ttlEl.textContent=title;ttsEl.textContent=sub||'';tttEl.textContent=body||'';ttEl.classList.add('vis');let l=e.clientX+14,t=e.clientY-10;if(l+270>window.innerWidth)l=e.clientX-280;ttEl.style.cssText+=`;left:${l}px;top:${t}px`}
function hideTT(){ttEl.classList.remove('vis')}

// Domain card
function domainCard(dId,expanded){
  const lyr=layerFor(dId);const dom=DOMAINS[dId];const sk=SKILLS[dId]||[];
  const nc=sk.filter(s=>s.isNew).length;
  return `<div class="domain-card" onclick="toggleCard(this)">
    <div class="dc-hdr"><div class="dc-dot" style="background:${lyr.color}"></div>
    <div class="dc-name">${dom.label}${nc?`<span class="new-badge">+${nc} NEW</span>`:''}</div></div>
    <div class="dc-id">${dId}</div>
    <div class="dc-desc">${dom.desc}</div>
    <div class="dc-foot"><span class="dc-cnt">${sk.length} skills</span>${nc?`<span class="dc-new">${nc} new</span>`:''}</div>
    <div class="skill-list${expanded?' open':''}">
      ${sk.map(s=>`<div class="sl-item"><span class="sl-id">${s.id}</span>${s.label}${s.isNew?'<span class="new-badge">NEW</span>':''}</div>`).join('')}
    </div></div>`;
}
function toggleCard(el){el.querySelector('.skill-list').classList.toggle('open')}

// Layers view
function renderLayers(){
  const grid=document.getElementById('layer-grid');
  const domsEl=document.getElementById('layer-domains');
  LAYERS.forEach((l,i)=>{
    const sk=l.domains.reduce((a,d)=>a+(SKILLS[d]||[]).length,0);
    const card=document.createElement('div');
    card.className='layer-card'+(i===0?' sel':'');
    card.style.borderColor=i===0?l.color:l.color+'44';
    card.dataset.lid=l.id;
    card.innerHTML=`<div class="lc-dot" style="background:${l.color}"></div><div class="lc-name">${l.label}</div><div class="lc-id">${l.id}</div><div class="lc-cnt">${l.domains.length} domains · ${sk} skills</div>`;
    card.onclick=()=>selectLayer(l.id);
    grid.appendChild(card);
  });
  selectLayer(LAYERS[0].id);
}
function selectLayer(lid){
  const lyr=LAYERS.find(l=>l.id===lid);
  document.querySelectorAll('.layer-card').forEach(c=>{
    const active=c.dataset.lid===lid;
    c.classList.toggle('sel',active);
    const l=LAYERS.find(x=>x.id===c.dataset.lid);
    c.style.borderColor=active?l.color:l.color+'44';
  });
  document.getElementById('layer-domains').innerHTML=lyr.domains.map(d=>domainCard(d,false)).join('');
}

// All domains view
function renderAllDomains(){
  document.getElementById('all-domains').innerHTML=LAYERS.flatMap(l=>l.domains.map(d=>domainCard(d,false))).join('');
}

// Stats view
function renderStats(){
  const el=document.getElementById('view-stats');
  const maxL=Math.max(...LAYERS.map(l=>l.domains.reduce((a,d)=>(SKILLS[d]||[]).length+a,0)));
  const maxD=Math.max(...Object.values(SKILLS).map(s=>s.length));
  el.innerHTML=`
    <div class="ss-block"><div class="ss-title">Skills by Layer</div>
    ${LAYERS.map(l=>{const c=l.domains.reduce((a,d)=>(SKILLS[d]||[]).length+a,0);const n=l.domains.reduce((a,d)=>(SKILLS[d]||[]).filter(s=>s.isNew).length+a,0);return `<div class="dist-row"><div class="dist-lbl">${l.label}</div><div class="dist-bar"><div class="dist-fill" style="width:${(c/maxL*100).toFixed(0)}%;background:${l.color}44;border-right:3px solid ${l.color}"></div></div><div class="dist-cnt">${c}${n?`<span class="new-flag">+${n}</span>`:''}</div></div>`}).join('')}
    </div>
    <div class="ss-block"><div class="ss-title">Skills by Domain</div>
    ${LAYERS.flatMap(l=>l.domains.map(dId=>{const c=(SKILLS[dId]||[]).length;const n=(SKILLS[dId]||[]).filter(s=>s.isNew).length;return `<div class="dist-row"><div class="dist-lbl">${DOMAINS[dId].label}</div><div class="dist-bar"><div class="dist-fill" style="width:${(c/maxD*100).toFixed(0)}%;background:${l.color}44;border-right:3px solid ${l.color}"></div></div><div class="dist-cnt">${c}${n?`<span class="new-flag">+${n}</span>`:''}</div></div>`})).join('')}
    </div>`;
}

// Mind Map — D3 radial tree
let mmSvg,mmZoomB;
function initMindMap(){
  const cont=document.getElementById('mm-wrap');
  const W=cont.clientWidth,H=cont.clientHeight;
  const treeData={name:'GenAI Ontology v2.0',type:'root',color:'#eeeeff',children:LAYERS.map(l=>({
    id:l.id,name:l.label,color:l.color,type:'layer',
    children:l.domains.map(dId=>{const sk=SKILLS[dId]||[];return{id:dId,name:DOMAINS[dId].label,desc:DOMAINS[dId].desc,color:l.color,type:'domain',skillCount:sk.length,newCount:sk.filter(s=>s.isNew).length}})
  }))};
  const svg=d3.select('#mm-wrap').append('svg').attr('width',W).attr('height',H).style('display','block');
  mmSvg=svg;
  const g=svg.append('g').attr('id','mmg');
  mmZoomB=d3.zoom().scaleExtent([0.25,3]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(mmZoomB);
  const root=d3.hierarchy(treeData);
  const tree=d3.tree().size([2*Math.PI,Math.min(W,H)*0.42]).separation((a,b)=>a.parent===b.parent?1.1:2);
  tree(root);
  const linkGen=d3.linkRadial().angle(d=>d.x).radius(d=>d.y);
  g.append('g').selectAll('path').data(root.links()).enter().append('path')
    .attr('d',linkGen).attr('fill','none')
    .attr('stroke',d=>d.target.data.color||'#333').attr('stroke-opacity',.2)
    .attr('stroke-width',d=>d.target.data.type==='layer'?1.5:.8);
  const node=g.append('g').selectAll('g').data(root.descendants()).enter().append('g')
    .attr('transform',d=>`rotate(${d.x*180/Math.PI-90}) translate(${d.y},0)`);
  node.append('circle')
    .attr('r',d=>d.data.type==='root'?16:d.data.type==='layer'?10:6)
    .attr('fill',d=>d.data.type==='root'?'#191935':d.data.color+'22')
    .attr('stroke',d=>d.data.color||'#555').attr('stroke-width',d=>d.data.type==='root'?2:1.5);
  // Root label
  node.filter(d=>!d.data.type||d.data.type==='root').append('text')
    .attr('text-anchor','middle').attr('dy','0.35em').attr('font-size',7)
    .attr('fill','#eeeeff').attr('font-family','Space Grotesk').text('v2.0');
  // Layer & domain labels
  node.filter(d=>d.data.type==='layer'||d.data.type==='domain').append('text')
    .attr('dy','0.35em')
    .attr('x',d=>d.x<Math.PI?9:-9)
    .attr('text-anchor',d=>d.x<Math.PI?'start':'end')
    .attr('transform',d=>d.x>=Math.PI?'rotate(180)':null)
    .attr('font-size',d=>d.data.type==='layer'?11:9)
    .attr('font-weight',d=>d.data.type==='layer'?700:400)
    .attr('fill',d=>d.data.color).attr('font-family','Space Grotesk')
    .text(d=>{const n=d.data.name;return n.length>20?n.slice(0,18)+'\u2026':n});
  // Domain hover
  const mmTT=document.getElementById('mm-tt');
  node.filter(d=>d.data.type==='domain')
    .style('cursor','pointer')
    .on('mouseover',function(e,d){
      d3.select(this).select('circle').attr('r',9).attr('fill',d.data.color+'55');
      mmTT.innerHTML=`<b>${d.data.name}</b> <span style="color:#9090b8;font-size:10px">${d.id}</span> · ${d.data.skillCount} skills${d.data.newCount?` · <span style="color:#EC4899">+${d.data.newCount} new</span>`:''}<br><span style="color:#b0b0d8">${d.data.desc}</span>`;
      mmTT.classList.add('vis');
    })
    .on('mouseout',function(e,d){
      d3.select(this).select('circle').attr('r',6).attr('fill',d.data.color+'22');
      mmTT.classList.remove('vis');
    });
  // Center the view
  svg.call(mmZoomB.transform,d3.zoomIdentity.translate(W/2,H/2));
}
function mmZoom(f){if(mmSvg)mmSvg.transition().duration(300).call(mmZoomB.scaleBy,f)}
function mmReset(){
  if(!mmSvg)return;
  const c=document.getElementById('mm-wrap');
  mmSvg.transition().duration(500).call(mmZoomB.transform,d3.zoomIdentity.translate(c.clientWidth/2,c.clientHeight/2));
}

// Force Graph — D3
let fgSvg,fgZoomB;
function initForceGraph(){
  const cont=document.getElementById('fg-wrap');
  const W=cont.clientWidth,H=cont.clientHeight;
  const nodes=[];const links=[];
  LAYERS.forEach(l=>{
    nodes.push({id:l.id,label:l.label,type:'layer',color:l.color,r:20});
    l.domains.forEach(dId=>{
      const sk=SKILLS[dId]||[];
      nodes.push({id:dId,label:DOMAINS[dId].label,type:'domain',color:l.color,r:12,sk:sk.length,nw:sk.filter(s=>s.isNew).length,desc:DOMAINS[dId].desc});
      links.push({source:l.id,target:dId,color:l.color});
    });
  });
  const svg=d3.select('#fg-wrap').append('svg').attr('width',W).attr('height',H).style('display','block');
  fgSvg=svg;
  const g=svg.append('g');
  fgZoomB=d3.zoom().scaleExtent([0.2,3]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(fgZoomB);
  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.source.type==='layer'?130:85).strength(.9))
    .force('charge',d3.forceManyBody().strength(-350))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide().radius(d=>d.r+10));
  const link=g.append('g').selectAll('line').data(links).enter().append('line')
    .attr('stroke',d=>d.color+'33').attr('stroke-width',1.5);
  const nodeG=g.append('g').selectAll('g').data(nodes).enter().append('g')
    .style('cursor','grab')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  nodeG.append('circle')
    .attr('r',d=>d.r)
    .attr('fill',d=>d.color+(d.type==='layer'?'33':'18'))
    .attr('stroke',d=>d.color).attr('stroke-width',d=>d.type==='layer'?2:1.5);
  nodeG.append('text')
    .attr('text-anchor','middle').attr('dy',d=>d.r+13)
    .attr('font-size',d=>d.type==='layer'?11:9)
    .attr('font-weight',d=>d.type==='layer'?700:400)
    .attr('fill',d=>d.color).attr('font-family','Space Grotesk')
    .text(d=>{const n=d.label;return n.length>16?n.slice(0,14)+'\u2026':n});
  nodeG.on('mousemove',(e,d)=>{
    const body=d.type==='domain'?`${d.sk} skills${d.nw?` (+${d.nw} new)`:''} · ${d.desc}`:`Layer · ${LAYERS.find(l=>l.id===d.id)?.domains.length||0} domains`;
    showTT(e,d.label,d.id,body);
  }).on('mouseleave',hideTT);
  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
  // Legend
  const leg=document.getElementById('fg-leg');
  leg.innerHTML=`<div style="font-size:11px;color:var(--mu);font-family:var(--fh);font-weight:600;margin-bottom:8px">Node Size</div>`;
  [{r:20,label:'Layer'},{r:12,label:'Domain'}].forEach(item=>{
    const row=document.createElement('div');row.className='fgl-row';
    row.innerHTML=`<svg width="${item.r*2+4}" height="${item.r*2+4}" style="flex-shrink:0"><circle cx="${item.r+2}" cy="${item.r+2}" r="${item.r}" fill="none" stroke="#8B5CF6" stroke-width="1.5"/></svg>${item.label}`;
    leg.appendChild(row);
  });
}

// Init
switchTab('mindmap');
