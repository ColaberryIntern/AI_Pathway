  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng<\u002Fdiv>\n        <div class=\"dc-name\">Dialogue Coach<\u002Fdiv>\n        <div class=\"dc-desc\">Split-screen conversational coaching interface. AI coach persona \"Aria\" on the left, chat-style content delivery on the right. Content reveals through typed messages with response options — feels like 1:1 mentoring.<\u002Fdiv>\n        <div class=\"dc-tags\" style=\"margin-bottom:14px\">\n          <div class=\"dc-tag\">Chat UI<\u002Fdiv>\n          <div class=\"dc-tag\">Coach persona<\u002Fdiv>\n          <div class=\"dc-tag\">Response choices<\u002Fdiv>\n          <div class=\"dc-tag\">Sequential reveal<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"dc-principles\">\n          <div class=\"dc-p-label\">Principles<\u002Fdiv>\n          <div class=\"dc-p-pills\">\n            <div class=\"dc-p-pill\">Dialogue-based learning<\u002Fdiv>\n            <div class=\"dc-p-pill\">Scaffolding<\u002Fdiv>\n            <div class=\"dc-p-pill\">Social cognition<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- Section structure -->\n<div class=\"structure-section\">\n  <div class=\"ss-inner\">\n    <div class=\"ss-title\">Consistent Chapter Structure<\u002Fdiv>\n    <div class=\"ss-sub\">All five designs implement the same five-section curriculum — only the UX language differs.<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px\">\n      <div>\n        <div class=\"structure-row\">\n          <div class=\"sr-num\">01<\u002Fdiv>\n          <div class=\"sr-content\">\n            <div class=\"sr-title\">Scenario &amp; Objectives<\u002Fdiv>\n            <div class=\"sr-desc\">Learner profile (role, industry, level), current state, desired A→B transformation, time commitment.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"structure-row\" style=\"margin-left:20px;padding-left:36px;border-left:1px solid var(--border);margin-top:-8px;padding-top:0;padding-bottom:16px\">\n        <\u002Fdiv>\n        <div class=\"structure-row\">\n          <div class=\"sr-num\">02<\u002Fdiv>\n          <div class=\"sr-content\">\n            <div class=\"sr-title\">AI Concepts<\u002Fdiv>\n            <div class=\"sr-desc\">3 core concepts with visual explanations. Mechanism, application, payoff. No jargon without definition.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"structure-row\" style=\"margin-left:20px;padding-left:36px;border-left:1px solid var(--border);margin-top:-8px;padding-top:0;padding-bottom:16px\">\n        <\u002Fdiv>\n        <div class=\"structure-row\">\n          <div class=\"sr-num\">03<\u002Fdiv>\n          <div class=\"sr-content\">\n            <div class=\"sr-title\">Live Examples (×2)<\u002Fdiv>\n            <div class=\"sr-desc\">Two real-work scenarios with attached documents, full prompt, and annotated breakdown of why it works.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"structure-row\">\n          <div class=\"sr-num\">04<\u002Fdiv>\n          <div class=\"sr-content\">\n            <div class=\"sr-title\">Build Your Agent<\u002Fdiv>\n            <div class=\"sr-desc\">Guided agent configuration form with live-updating spec. Learner customises to their actual workflow and leaves with a deployable artifact.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"structure-row\" style=\"margin-left:20px;padding-left:36px;border-left:1px solid var(--border);margin-top:-8px;padding-top:0;padding-bottom:16px\">\n        <\u002Fdiv>\n        <div class=\"structure-row\">\n          <div class=\"sr-num\">05<\u002Fdiv>\n          <div class=\"sr-content\">\n            <div class=\"sr-title\">Completion &amp; Next Steps<\u002Fdiv>\n            <div class=\"sr-desc\">Skill confirmation, earned badges/XP (design-dependent), next recommended skills from the ontology.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Adult learning principles -->\n<div class=\"principles-section\">\n  <div class=\"ps-inner\">\n    <div class=\"ps-title\">Adult Learning Principles Applied<\u002Fdiv>\n    <div class=\"ps-sub\">Each design applies a different emphasis across these evidence-based principles.<\u002Fdiv>\n    <div class=\"principles-grid\">\n      <div class=\"principle\">\n        <div class=\"pr-icon\">🎯<\u002Fdiv>\n        <div class=\"pr-name\">Goal Orientation<\u002Fdiv>\n        <div class=\"pr-desc\">Every chapter opens with a clear A→B journey tied to the learner's actual role and workflow. Adults learn when they see direct relevance to their job.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"pr-icon\">🔨<\u002Fdiv>\n        <div class=\"pr-name\">Learning by Doing<\u002Fdiv>\n        <div class=\"pr-desc\">The agent builder in Section 4 produces a real deployable artifact — not a quiz. Constructivist learning: build something you actually keep.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"pr-icon\">📖<\u002Fdiv>\n        <div class=\"pr-name\">Worked Examples<\u002Fdiv>\n        <div class=\"pr-desc\">Two industry-specific examples with full prompts, attached documents, and expert annotation. Reduces cognitive load vs. abstract instruction.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"pr-icon\">🔓<\u002Fdiv>\n        <div class=\"pr-name\">Progressive Disclosure<\u002Fdiv>\n        <div class=\"pr-desc\">Sections unlock sequentially — learners can't skip to the agent builder without context. Prevents overwhelm and ensures prerequisite knowledge.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"pr-icon\">🗂️<\u002Fdiv>\n        <div class=\"pr-name\">Spaced Retrieval<\u002Fdiv>\n        <div class=\"pr-desc\">Concepts introduced in Section 2 are immediately applied in Section 3 examples and then transferred to Section 4 agent design. Three retrieval moments per concept.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"pr-icon\">🤝<\u002Fdiv>\n        <div class=\"pr-name\">Self-Determination<\u002Fdiv>\n        <div class=\"pr-desc\">Learners customise the agent to their own workflow. Autonomy and personalisation are core SDT motivators — learners who input their own data engage more deeply.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer\">\n  <div class=\"footer-text\">AI Pathway Chapters · Developer Preview · GenAI Skills Ontology v2.0 · SK.PRM.005 Demo<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function() {\n  const c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');\n  const COLS = ['#6366F1','#8B5CF6','#EC4899','#06B6D4','#10B981'];\n  let pts = [];\n  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }\n  function init() {\n    pts = [];\n    const n = Math.min(35, Math.floor(window.innerWidth * window.innerHeight / 22000));\n    for (let i = 0; i < n; i++) pts.push({ x: Math.random()*c.width, y: Math.random()*c.height, vx: (Math.random()-.5)*.2, vy: (Math.random()-.5)*.2, r: Math.random()*1.5+.5, col: COLS[i%COLS.length] });\n  }\n  let last = 0;\n  function draw(ts) {\n    if (ts - last < 33) { requestAnimationFrame(draw); return; }\n    last = ts;\n    ctx.clearRect(0, 0, c.width, c.height);\n    for (let i = 0; i < pts.length; i++) for (let j = i+1; j < pts.length; j++) {\n      const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y, d = Math.sqrt(dx*dx+dy*dy);\n      if (d < 140) { const a = Math.floor((1-d/140)*25).toString(16).padStart(2,'0'); ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle = pts[i].col+a; ctx.lineWidth = .5; ctx.stroke(); }\n    }\n    pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fillStyle = p.col+'77'; ctx.fill(); p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>c.width)p.vx*=-1; if(p.y<0||p.y>c.height)p.vy*=-1; });\n    requestAnimationFrame(draw);\n  }\n  resize(); init(); requestAnimationFrame(draw);\n  window.addEventListener('resize', () => { resize(); init(); });\n})();\n<\u002Fscript>\n<\u002Fdiv>\n<div id=\"viewer-wrap\">\n  <div id=\"viewer-bar\">\n    <button id=\"back-btn\" onclick=\"closeDesign()\">← Back to Showcase<\u002Fbutton>\n    <div id=\"viewer-title\"><\u002Fdiv>\n  <\u002Fdiv>\n  <iframe id=\"design-frame\" allowfullscreen=\"\"><\u002Fiframe>\n<\u002Fdiv>\n<script>\nvar TITLES={1:'Design 01 · Mission Briefing',2:'Design 02 · Field Guide',3:'Design 03 · Builder Workbench',4:'Design 04 · Learning Studio',5:'Design 05 · Dialogue Coach'};\nvar B64={\n  1:'PCFET0NUWVBFIGh0bWw+CjxodG1sIGxhbmc9ImVuIj4KPGhlYWQ+CjxtZXRhIGNoYXJzZXQ9IlVURi04Ij48bWV0YSBuYW1lPSJ2aWV3cG9ydCIgY29udGVudD0id2lkdGg9ZGV2aWNlLXdpZHRoLCBpbml0aWFsLXNjYWxlPTEuMCI+Cjx0aXRsZT5NaXNzaW9uIEJyaWVmaW5nIOKAlCBDaGFpbi1vZi1UaG91Z2h0IFByb21wdGluZzwvdGl0bGU+CjxsaW5rIGhyZWY9Imh0dHBzOi8vZm9udHMuZ29vZ2xlYXBpcy5jb20vY3NzMj9mYW1pbHk9U3BhY2UrR3JvdGVzazp3Z2h0QDMwMDs0MDA7NTAwOzYwMDs3MDAmZmFtaWx5PUpldEJyYWlucytNb25vOndnaHRANDAwOzUwMDs3MDAmZGlzcGxheT1zd2FwIiByZWw9InN0eWxlc2hlZXQiPgo8c3R5bGU+Cjpyb290IHsKICAtLWJnOiAjMDcwNzBmOwogIC0tYmcyOiAjMGQwZDFjOwogIC0tYmczOiAjMTIxMjI4OwogIC0tYm9yZGVyOiAjMWUxZTQwOwogIC0tYm9yZGVyMjogIzJhMmE1YTsKICAtLXR4OiAjZWVlZWZmOwogIC0tbXV0ZWQ6ICM5MDkwYjg7CiAgLS1kaW06ICM1YTVhODA7CiAgLS1jeWFuOiAjMDZiNmQ0OwogIC0taW5kaWdvOiAjNjM2NmYxOwogIC0tdmlvbGV0OiAjOGI1Y2Y2OwogIC0tcGluazogI2VjNDg5OTsKICAtLWdyZWVuOiAjMTBiOTgxOwogIC0tbW9ubzogJ0pldEJyYWlucyBNb25vJywgbW9ub3NwYWNlOwogIC0tc2FuczogJ1NwYWNlIEdyb3Rlc2snLCBzYW5zLXNlcmlmOwp9CiogeyBib3gtc2l6aW5nOiBib3JkZXItYm94OyBtYXJnaW46IDA7IHBhZGRpbmc6IDA7IH0KaHRtbCB7IHNjcm9sbC1iZWhhdmlvcjogc21vb3RoOyB9CmJvZHkgeyBiYWNrZ3JvdW5kOiB2YXIoLS1iZyk7IGNvbG9yOiB2YXIoLS10eCk7IGZvbnQtZmFtaWx5OiB2YXIoLS1zYW5zKTsgb3ZlcmZsb3cteDogaGlk
